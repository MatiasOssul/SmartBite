# render.yaml — SmartBite monorepo
# Docs: https://render.com/docs/infrastructure-as-code
#
# Variables marcadas con `sync: false` deben ser ingresadas
# manualmente en el dashboard de Render (Environment → Add var).

services:

  # ─── Backend (FastAPI + Uvicorn) ─────────────────────────────────────────
  - type: web
    name: smartbite-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # Ingresar manualmente en Render dashboard
      - key: PEXELS_API_KEY
        sync: false          # Ingresar manualmente en Render dashboard
      - key: JWT_SECRET_KEY
        generateValue: true  # Render genera un valor seguro automáticamente
      - key: MOCK_LLM
        value: "False"
      - key: FRONTEND_URL
        value: https://smartbite-frontend.onrender.com

  # ─── Frontend (Vite → Static Site) ───────────────────────────────────────
  - type: web
    name: smartbite-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        value: https://smartbite-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
